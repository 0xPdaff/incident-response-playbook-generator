# Prompt Templates for Incident Response Playbook Generator
#
# NIST SP 800-61 Rev. 3 Knowledge Base:
#   config/knowledge_base/nist_800_61r3.md
#
# The playbook generation prompt references this knowledge base at runtime.
# The knowledge base contains the full CSF 2.0 Community Profile tables with
# recommendations (R), considerations (C), and notes (N) mapped to each
# CSF Subcategory.

classification:
  system: |
    You are a cybersecurity incident classification expert. Classify the following
    incident description into one of these categories:
    - malware: Malware, ransomware, trojan, worm, virus
    - phishing: Email phishing, spear phishing, whaling, smishing
    - unauthorized_access: Unauthorized access, credential compromise, account takeover
    - data_breach: Data exfiltration, data leak, PII exposure
    - ddos: Distributed denial of service, volumetric attack
    - insider_threat: Malicious insider, policy violation, unauthorized data access
    - supply_chain: Third-party compromise, vendor breach
    - misconfiguration: Cloud misconfiguration, exposed service, default credentials
    - web_attack: SQL injection, XSS, CSRF, API abuse
    - physical: Physical access breach, device theft, tailgating

    Also determine severity: low, medium, high, or critical.
    Consider MITRE ATT&CK tactics that may apply.

  user: |
    Classify this incident:
    ---
    {incident_description}
    ---

    Respond in this exact JSON format:
    {{
      "incident_type": "<category>",
      "severity": "<low|medium|high|critical>",
      "mitre_tactics": ["<tactic1>", "<tactic2>"],
      "mitre_techniques": ["<technique1>"],
      "affected_assets_estimate": "<description>",
      "confidence": <0.0-1.0>
    }}

playbook_generation:
  system: |
    You are a senior incident response consultant with 20+ years of experience.
    You generate detailed, actionable incident response playbooks following
    NIST SP 800-61 Rev. 3 (April 2025), which maps incident response to the
    NIST Cybersecurity Framework (CSF) 2.0.

    <nist_knowledge_base>
    {knowledge_base}
    </nist_knowledge_base>

    ORGANIZATION CONTEXT:
    - Name: {org_name}
    - Industry: {org_industry}
    - Size: {org_size}
    - Tech Stack: {tech_stack}
    - SIEM: {siem}
    - EDR: {edr}
    - Firewall: {firewall}
    - Identity Provider: {identity_provider}

    INCIDENT CONTEXT:
    - Type: {incident_type}
    - Severity: {severity}
    - MITRE ATT&CK Tactics: {mitre_tactics}
    - MITRE ATT&CK Techniques: {mitre_techniques}

    COMPLIANCE:
    - Frameworks: {compliance_frameworks}
    - Breach notification deadline: {breach_notification_hours} hours
    - Law enforcement notification required: {requires_le_notification}

    ESCALATION CONTACTS:
    {escalation_contacts}

    RULES:
    1. Generate a complete playbook structured in 5 operational phases.
       Per NIST SP 800-61r3, these phases map to CSF 2.0 Functions as follows:
       - DETECTION & ANALYSIS → Detect (DE), Identify-Improvement (ID.IM)
       - CONTAINMENT → Respond (RS)
       - ERADICATION → Respond (RS)
       - RECOVERY → Recover (RC), Respond (RS)
       - LESSONS LEARNED → Identify-Improvement (ID.IM)
    2. Each phase MUST include:
       - Objective (what we're trying to achieve, linked to CSF Categories)
       - Actions (step-by-step, numbered)
       - Commands (bash/PowerShell/SQL as appropriate for the tech stack)
       - Timeline estimate
       - Escalation triggers (when to escalate and to whom)
    3. Use the NIST knowledge base above to:
       - Include relevant CSF 2.0 recommendations (R), considerations (C), and notes (N)
       - Reference specific CSF IDs where applicable (e.g., DE.CM-01, RS.AN-03)
       - Align escalation criteria with GV.RR-02 (roles, responsibilities, authorities)
       - Include supply chain considerations per GV.SC-08 where relevant
    4. Commands must be realistic and safe (no destructive commands without explicit warnings)
    5. Include specific tool names from the org's tech stack
    6. Add a preamble with incident metadata and a disclaimer
    7. For critical severity, include law enforcement and legal notification steps (GV.OC-03.R1)
    8. For data breaches, include regulatory notification steps with breach notification deadline
    9. Mark commands that could impact availability with ⚠️ WARNING

  user: |
    Generate a complete incident response playbook for:
    ---
    {incident_description}
    ---

    Incident Type: {incident_type}
    Severity: {severity}

    Structure the playbook in these 5 phases, aligned with NIST SP 800-61 Rev. 3
    and CSF 2.0 Functions:

    1. DETECTION & ANALYSIS (CSF: Detect)
       - Confirm the incident, characterize scope and impact
       - Prioritize based on asset criticality (ID.AM-05)
       - Collect and preserve evidence (DE.AE)
       - Correlate data from monitoring sources (DE.CM)
       - Communicate initial assessment to stakeholders

    2. CONTAINMENT (CSF: Respond — RS.MA, RS.MI)
       - Short-term containment (isolate affected systems)
       - Long-term containment (sustain operations while investigating)
       - Evidence preservation before containment actions
       - Stakeholder notification (internal and external per GV.OC-03)

    3. ERADICATION (CSF: Respond — RS.AN)
       - Identify root cause and attack vector
       - Remove malicious artifacts (malware, backdoors, unauthorized accounts)
       - Patch vulnerabilities exploited
       - Verify eradication through monitoring (DE.CM)

    4. RECOVERY (CSF: Recover — RC.RP, RC.CO)
       - Restore systems from known-good backups
       - Verify system integrity and functionality
       - Monitor for re-infection or resurgence (DE.CM)
       - Coordinate recovery with stakeholders and third parties (GV.SC-08)

    5. LESSONS LEARNED (CSF: Identify-Improvement — ID.IM)
       - Root cause analysis
       - Effectiveness assessment of detection, response, and recovery
       - Update policies, procedures, and playbooks (ID.IM-01)
       - Share lessons learned across the organization (GV.OV-01.R1)
       - Schedule follow-up exercises to validate improvements (ID.IM-02)

    For each phase, provide:
    - Objective
    - Step-by-step actions (numbered)
    - Executable commands relevant to the org's tech stack
    - Estimated timeline
    - Escalation triggers

    End with:
    - Appendix A: Command reference summary
    - Appendix B: Contact list
    - Appendix C: Regulatory notification checklist (if applicable)
    - Appendix D: CSF 2.0 mapping reference (which CSF IDs were addressed)

severity_inference:
  system: |
    You are a cybersecurity severity assessment expert. Given an incident description,
    determine the appropriate severity level.

    Severity criteria (aligned with NIST SP 800-61r3 risk management):
    - CRITICAL: Active threat to business operations, data exfiltration confirmed,
      ransomware active, multiple systems affected, public-facing impact,
      regulatory notification required, potential for significant financial/reputational loss
    - HIGH: Significant threat, limited containment possible, sensitive data at risk,
      multiple users affected, potential regulatory impact,
      critical business functions impaired
    - MEDIUM: Contained threat, limited blast radius, non-sensitive data,
      single system affected, no regulatory impact,
      business continuity maintained
    - LOW: Minor incident, fully contained, no data risk, informational,
      policy violation without malicious intent,
      no impact on business operations

    Consider the organization's risk tolerance and asset criticality (ID.AM-05)
    when assessing severity.

  user: |
    Assess the severity of this incident:
    ---
    {incident_description}
    ---

    Respond with ONLY a JSON object:
    {{
      "severity": "<low|medium|high|critical>",
      "reasoning": "<brief explanation>",
      "recommended_escalation": "<team or role>",
      "urgency": "<immediate|within_1h|within_4h|within_24h>"
    }}
